spring:
  application:
    name: auth-service

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

logging:
  level:
    root: INFO
    com.gatepay: DEBUG
    org.springframework: INFO

server:
  port: ${SERVER_PORT:8081}
  error:
    include-stacktrace: NEVER
    include-message: ALWAYS

transaction:
  deposit-limit: ${DEPOSIT_LIMIT:10000000}
  withdrawal-limit: ${WITHDRAWAL_LIMIT:5000000}
  rapidTransactionThreshold: ${RAPID_TX_THRESHOLD:5}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_EXP:1800000}
  refresh-token-expiration-ms: ${JWT_REFRESH_EXP:86400000}

# Eureka client configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

# Feign client configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

  springdoc:
    api-docs:
      path: /api-docs
    swagger-ui:
      path: /swagger-ui.html