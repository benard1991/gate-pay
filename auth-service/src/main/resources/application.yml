spring:
  application:
    name: ${SPRING_APPLICATION_NAME:auth-service}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.gatepay: ${LOG_LEVEL_GATEPAY:DEBUG}
    org.springframework: ${LOG_LEVEL_SPRING:INFO}

server:
  port: ${SERVER_PORT:8081}
  error:
    include-stacktrace: NEVER
    include-message: ALWAYS

transaction:
  deposit-limit: ${DEPOSIT_LIMIT:10000000}
  withdrawal-limit: ${WITHDRAWAL_LIMIT:5000000}
  rapidTransactionThreshold: ${RAPID_TX_THRESHOLD:5}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_EXP:1800000}
  refresh-token-expiration-ms: ${JWT_REFRESH_EXP:86400000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: ${EUREKA_REGISTER:true}
    fetch-registry: ${EUREKA_FETCH_REGISTRY:true}
    registry-fetch-interval-seconds: ${EUREKA_FETCH_INTERVAL:5}
    eureka-server-connect-timeout-seconds: ${EUREKA_SERVER_CONNECT_TIMEOUT:10}
    eureka-server-read-timeout-seconds: ${EUREKA_SERVER_READ_TIMEOUT:10}
    initial-instance-info-replication-interval-seconds: ${EUREKA_REPLICATION_INTERVAL:5}
  instance:
    prefer-ip-address: true
    health-check-url-path: /actuator/health
    lease-renewal-interval-in-seconds: ${EUREKA_LEASE_RENEWAL_INTERVAL:10}
    lease-expiration-duration-in-seconds: ${EUREKA_LEASE_EXPIRATION_DURATION:30}

feign:
  client:
    config:
      default:
        connectTimeout: ${FEIGN_CONNECT_TIMEOUT:5000}
        readTimeout: ${FEIGN_READ_TIMEOUT:5000}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html