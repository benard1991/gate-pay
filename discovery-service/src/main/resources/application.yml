server:
  port: ${SERVER_PORT:8761}

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:discovery-service}

eureka:
  client:
    register-with-eureka: ${EUREKA_CLIENT_REGISTER_WITH_EUREKA:false}
    fetch-registry: ${EUREKA_CLIENT_FETCH_REGISTRY:false}
    service-url:
      defaultZone: ${EUREKA_CLIENT_DEFAULT_ZONE:http://localhost:8761/eureka/}

  server:
    wait-time-in-ms-when-sync-empty: ${EUREKA_SERVER_WAIT_TIME_IN_MS_WHEN_SYNC_EMPTY:0}
    enable-self-preservation: ${EUREKA_SERVER_ENABLE_SELF_PRESERVATION:false}
    peer-node-read-timeout-ms: ${EUREKA_SERVER_PEER_NODE_READ_TIMEOUT_MS:60000}
    peer-node-connect-timeout-ms: ${EUREKA_SERVER_PEER_NODE_CONNECT_TIMEOUT_MS:60000}
