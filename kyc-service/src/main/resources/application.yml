spring:
  application:
    name: kyc-service

  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_MIN_IDLE:2}
      idle-timeout: ${SPRING_DATASOURCE_IDLE_TIMEOUT:30000}
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT:20000}
      pool-name: HikariCP
      connection-test-query: SELECT 1
      keepalive-time: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        show_sql: false

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    clean-on-validation-error: ${SPRING_FLYWAY_CLEAN_ON_VALIDATION_ERROR:false}
    locations: classpath:db/migration

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    org.flywaydb: ${LOGGING_LEVEL_FLYWAY:DEBUG}
    com.gatepay.kycservice: ${LOGGING_LEVEL_KYCSERVICE:DEBUG}
    org.springframework: ${LOGGING_LEVEL_SPRING:INFO}

server:
  port: ${SERVER_PORT:8085}
  error:
    include-stacktrace: NEVER
    include-message: ALWAYS

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
    register-with-eureka: ${EUREKA_REGISTER:true}
    fetch-registry: ${EUREKA_FETCH_REGISTRY:true}
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP:true}

feign:
  client:
    config:
      default:
        connectTimeout: ${FEIGN_CONNECT_TIMEOUT:9000}
        readTimeout: ${FEIGN_READ_TIMEOUT:8000}

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

kyc:
  idempotency:
    ttl-minutes: ${KYC_IDEMPOTENCY_TTL_MINUTES:5}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html