spring:
  application:
    name: ${SPRING_APPLICATION_NAME:user-service}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000
      pool-name: HikariCP

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL:update}  # update/validate/none
    properties:
      hibernate:
        dialect: ${HIBERNATE_DIALECT:org.hibernate.dialect.MySQL8Dialect}
        format_sql: true
        show_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-on-validation-error: false
    locations: classpath:db/migration

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

logging:
  level:
    root: INFO
    org.flywaydb: DEBUG
    com.gatepay.userservice: DEBUG
    org.springframework: INFO

server:
  port: ${USER_SERVICE_PORT:8082}
  error:
    include-stacktrace: NEVER
    include-message: ALWAYS

# Eureka client configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
    instance:
      prefer-ip-address: true  # register service using IP

# Feign client configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

# Management endpoints (avoid DifferentManagementContextConfiguration error)
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  server:
    port: ${USER_SERVICE_PORT:8082}  # same as main server port
