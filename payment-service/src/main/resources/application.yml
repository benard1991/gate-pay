spring:
  application:
    name: payment-service

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_MIN_IDLE:2}
      idle-timeout: ${SPRING_DATASOURCE_IDLE_TIMEOUT:30000}
      connection-timeout: ${SPRING_DATASOURCE_CONNECTION_TIMEOUT:20000}
      pool-name: HikariCP

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        show_sql: false

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    clean-on-validation-error: ${SPRING_FLYWAY_CLEAN_ON_VALIDATION_ERROR:false}
    locations: classpath:db/migration

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    org.flywaydb: ${LOGGING_LEVEL_FLYWAY:DEBUG}
    com.gatepay.paymentservice: ${LOGGING_LEVEL_PAYMENT_SERVICE:DEBUG}
    org.springframework: ${LOGGING_LEVEL_SPRING:INFO}

server:
  port: ${SERVER_PORT:8087}
  error:
    include-stacktrace: NEVER
    include-message: ALWAYS

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
    register-with-eureka: ${EUREKA_REGISTER:true}
    fetch-registry: ${EUREKA_FETCH_REGISTRY:true}
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP:true}

feign:
  client:
    config:
      default:
        connectTimeout: ${FEIGN_CONNECT_TIMEOUT:5000}
        readTimeout: ${FEIGN_READ_TIMEOUT:5000}

paystack:
  secret-key: ${PAYSTACK_SECRET_KEY}
  public-key: ${PAYSTACK_PUBLIC_KEY}
  base-url: ${PAYSTACK_BASE_URL}
  default-currency: ${PAYSTACK_DEFAULT_CURRENCY:NGN}

flutterwave:
  secret-key: ${FLUTTERWAVE_SECRET_KEY}
  public-key: ${FLUTTERWAVE_PUBLIC_KEY}
  base-url: ${FLUTTERWAVE_BASE_URL}
  encryption-key: ${FLUTTERWAVE_ENCRYPTION_KEY}

interswitch:
  client-id: ${INTERSWITCH_CLIENT_ID}
  secret: ${INTERSWITCH_SECRET}
  merchant-code: ${INTERSWITCH_MERCHANT_CODE}
  pay-item-id: ${INTERSWITCH_PAY_ITEM_ID}
  base-url: ${INTERSWITCH_BASE_URL}
  mode: ${INTERSWITCH_MODE}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html