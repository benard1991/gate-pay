spring:
  application:
    name: ${SPRING_APPLICATION_NAME:payment-service}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: ${RABBITMQ_RETRY_INITIAL_INTERVAL:3000}
          max-attempts: ${RABBITMQ_RETRY_MAX_ATTEMPTS:5}

  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:300000}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:20000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:600000}
      pool-name: HikariCP
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL:none}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: ${HIBERNATE_BATCH_SIZE:20}
        order_inserts: true
        order_updates: true

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    validate-on-migrate: true
    baseline-on-migrate: false
    clean-on-validation-error: false
    locations: classpath:db/migration

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.flywaydb: ${LOG_LEVEL_FLYWAY:DEBUG}
    com.gatepay.paymentservice: ${LOG_LEVEL_PAYMENT_SERVICE:DEBUG}
    org.springframework: ${LOG_LEVEL_SPRING:INFO}

server:
  port: ${SERVER_PORT:8087}
  error:
    include-stacktrace: NEVER
    include-message: ALWAYS

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
    register-with-eureka: ${EUREKA_REGISTER:true}
    fetch-registry: ${EUREKA_FETCH_REGISTRY:true}
    registry-fetch-interval-seconds: ${EUREKA_FETCH_INTERVAL:5}
    eureka-server-connect-timeout-seconds: ${EUREKA_SERVER_CONNECT_TIMEOUT:10}
    eureka-server-read-timeout-seconds: ${EUREKA_SERVER_READ_TIMEOUT:10}
    initial-instance-info-replication-interval-seconds: ${EUREKA_REPLICATION_INTERVAL:5}
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP:true}
    health-check-url-path: /actuator/health
    lease-renewal-interval-in-seconds: ${EUREKA_LEASE_RENEWAL_INTERVAL:10}
    lease-expiration-duration-in-seconds: ${EUREKA_LEASE_EXPIRATION_DURATION:30}

feign:
  client:
    config:
      default:
        connectTimeout: ${FEIGN_CONNECT_TIMEOUT:5000}
        readTimeout: ${FEIGN_READ_TIMEOUT:5000}

paystack:
  secret-key: ${PAYSTACK_SECRET_KEY}
  public-key: ${PAYSTACK_PUBLIC_KEY}
  base-url: ${PAYSTACK_BASE_URL}
  default-currency: ${PAYSTACK_DEFAULT_CURRENCY:NGN}

flutterwave:
  secret-key: ${FLUTTERWAVE_SECRET_KEY}
  public-key: ${FLUTTERWAVE_PUBLIC_KEY}
  base-url: ${FLUTTERWAVE_BASE_URL}
  encryption-key: ${FLUTTERWAVE_ENCRYPTION_KEY}

interswitch:
  client-id: ${INTERSWITCH_CLIENT_ID}
  secret: ${INTERSWITCH_SECRET}
  merchant-code: ${INTERSWITCH_MERCHANT_CODE}
  pay-item-id: ${INTERSWITCH_PAY_ITEM_ID}
  base-url: ${INTERSWITCH_BASE_URL}
  mode: ${INTERSWITCH_MODE}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html