spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: localhost
    port: 5672

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

  cloud:
    openfeign:
      circuitbreaker:
        enabled: false
    discovery:
      enabled: false

eureka:
  client:
    enabled: false