server:
  port: ${USER_SERVICE_PORT:8082}
  error:
    include-stacktrace: NEVER
    include-message: ALWAYS

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:user-service}

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:20000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:600000}
      initialization-fail-timeout: ${HIKARI_INIT_FAIL_TIMEOUT:30000}
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL:none}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: ${HIBERNATE_BATCH_SIZE:20}
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    validate-on-migrate: true
    baseline-on-migrate: false
    clean-on-validation-error: false
    locations: classpath:db/migration

  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: ${RABBITMQ_RETRY_INITIAL_INTERVAL:3000}
          max-attempts: ${RABBITMQ_RETRY_MAX_ATTEMPTS:5}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: ${EUREKA_REGISTER:true}
    fetch-registry: ${EUREKA_FETCH_REGISTRY:true}
    registry-fetch-interval-seconds: ${EUREKA_FETCH_INTERVAL:5}
    eureka-server-connect-timeout-seconds: ${EUREKA_SERVER_CONNECT_TIMEOUT:10}
    eureka-server-read-timeout-seconds: ${EUREKA_SERVER_READ_TIMEOUT:10}
    initial-instance-info-replication-interval-seconds: ${EUREKA_REPLICATION_INTERVAL:5}
  instance:
    prefer-ip-address: true
    health-check-url-path: /actuator/health
    lease-renewal-interval-in-seconds: ${EUREKA_LEASE_RENEWAL_INTERVAL:10}
    lease-expiration-duration-in-seconds: ${EUREKA_LEASE_EXPIRATION_DURATION:30}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
      connect-timeout: ${ZIPKIN_CONNECT_TIMEOUT:1s}
      read-timeout: ${ZIPKIN_READ_TIMEOUT:3s}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.gatepay.userservice: ${LOG_LEVEL_USER_SERVICE:DEBUG}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html