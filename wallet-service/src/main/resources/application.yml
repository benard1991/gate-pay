server:
  port: ${SERVER_PORT:8086}
  error:
    include-stacktrace: NEVER
    include-message: ALWAYS

spring:
  application:
    name: ${SPRING_APPLICATION_NAME:wallet-service}

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:20000}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:300000}
      max-lifetime: ${HIKARI_MAX_LIFETIME:600000}
      pool-name: HikariCP
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL:none}
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: ${HIBERNATE_BATCH_SIZE:20}
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    validate-on-migrate: true
    baseline-on-migrate: false
    clean-on-validation-error: false
    locations: classpath:db/migration

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: ${RABBITMQ_RETRY_INITIAL_INTERVAL:3000}
          max-attempts: ${RABBITMQ_RETRY_MAX_ATTEMPTS:5}

  data:
    redis:
      host: ${SPRING_REDIS_HOST:redis}
      port: ${SPRING_REDIS_PORT:6379}

# Wallet RabbitMQ
wallet:
  rabbitmq:
    exchange: ${WALLET_RABBITMQ_EXCHANGE:wallet.exchange}
    routing-key:
      credit:    ${WALLET_RABBITMQ_ROUTING_KEY_CREDIT:wallet.credit}
      debit:     ${WALLET_RABBITMQ_ROUTING_KEY_DEBIT:wallet.debit}
      reversal:  ${WALLET_RABBITMQ_ROUTING_KEY_REVERSAL:wallet.reversal}
      created:   ${WALLET_RABBITMQ_ROUTING_KEY_CREATED:wallet.created}
      suspended: ${WALLET_RABBITMQ_ROUTING_KEY_SUSPENDED:wallet.suspended}
  idempotency:
    ttl-hours: ${WALLET_IDEMPOTENCY_TTL_HOURS:24}
  default-currency: ${WALLET_DEFAULT_CURRENCY:NGN}

# Notification RabbitMQ
notification:
  rabbitmq:
    exchange: ${NOTIFICATION_RABBITMQ_EXCHANGE:notification.exchange}
    routing-key: ${NOTIFICATION_RABBITMQ_ROUTING_KEY:notification.routing.key}

# KYC RabbitMQ
kyc:
  rabbitmq:
    queue:
      approved: ${KYC_RABBITMQ_QUEUE_APPROVED:kyc.approved.queue}

# Payment RabbitMQ
payment:
  rabbitmq:
    queue:
      success: ${PAYMENT_RABBITMQ_QUEUE_SUCCESS:payment.success.queue}

# Eureka
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: ${EUREKA_REGISTER:true}
    fetch-registry: ${EUREKA_FETCH_REGISTRY:true}
    registry-fetch-interval-seconds: ${EUREKA_FETCH_INTERVAL:5}
    eureka-server-connect-timeout-seconds: ${EUREKA_SERVER_CONNECT_TIMEOUT:10}
    eureka-server-read-timeout-seconds: ${EUREKA_SERVER_READ_TIMEOUT:10}
    initial-instance-info-replication-interval-seconds: ${EUREKA_REPLICATION_INTERVAL:5}
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}
    health-check-url-path: /actuator/health
    lease-renewal-interval-in-seconds: ${EUREKA_LEASE_RENEWAL_INTERVAL:10}
    lease-expiration-duration-in-seconds: ${EUREKA_LEASE_EXPIRATION_DURATION:30}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}

# Logging
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.gatepay.walletservice: ${LOG_LEVEL_WALLET_SERVICE:DEBUG}

# Springdoc
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html